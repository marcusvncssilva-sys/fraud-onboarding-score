name: Model Retraining

on:
  schedule:
    - cron: "0 2 * * 1"  # toda segunda-feira às 02:00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do retraining manual"
        required: true

jobs:
  retrain:
    name: Retrain champion model
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run drift check before retraining
        run: |
          poetry run python -m src.monitoring.drift_detector \
            --reference data/processed/reference_dataset.parquet \
            --current data/processed/current_dataset.parquet \
            --output reports/pre_retrain_drift.html

      - name: Retrain model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          PSEUDONYM_SECRET_KEY: ${{ secrets.PSEUDONYM_SECRET_KEY }}
        run: |
          poetry run python scripts/train_model.py \
            --config configs/model_config.yaml \
            --run-name "scheduled-retrain-$(date +%Y%m%d)"

      - name: Evaluate new model
        run: |
          poetry run python scripts/evaluate_model.py \
            --model-version latest \
            --min-ks 0.40 \
            --output reports/retrain_evaluation.html

      - name: Notify team on failure
        if: failure()
        run: |
          echo "Retraining falhou — notificar time via Slack/email"
