name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

jobs:
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.api \
            -t fraud-score-api:${{ github.sha }} \
            -t fraud-score-api:staging-latest \
            .

      - name: Run integration tests against image
        run: |
          docker run -d --name test-api \
            -e ENVIRONMENT=staging \
            -e PSEUDONYM_SECRET_KEY=${{ secrets.PSEUDONYM_SECRET_KEY_STAGING }} \
            -p 8000:8000 \
            fraud-score-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api

      - name: Deploy to staging
        run: |
          echo "Deploy para staging — substituir por comando real (kubectl, ECS, etc.)"
          echo "Image: fraud-score-api:${{ github.sha }}"

  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.inputs.environment == 'production'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploy para produção com aprovação manual"
          echo "Image: fraud-score-api:${{ github.sha }}"
